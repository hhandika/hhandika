name: Update GitHub Stats README

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Run unit tests
        run: uv run pytest

      - name: Update GitHub Stats SVGs and README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python update_stats.py

      - name: Commit and push if stats changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ stats/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update GitHub profile stats cards [skip ci]"
            git push
          else
            echo "No changes in stats cards or README.md."
          fi
