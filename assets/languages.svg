<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220" fill="none" role="img" aria-labelledby="titleId descId">
  <title id="titleId">GitHub Stats</title>
  <desc id="descId">GitHub statistics dashboard</desc>
<style>

    :root {
      /* Light Theme (Chetwode and Porsche) */
      --md-sys-color-surface: #fcfcfc;
      --md-sys-color-on-surface: #1a1c1e;
      --md-sys-color-surface-variant: #e1e2e8;
      --md-sys-color-on-surface-variant: #44474e;
      --md-sys-color-surface-container: #f0f5fd; /* Chetwode 50 */
      
      --md-sys-color-primary: #5a67d1; /* Chetwode 600 */
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #e4edfb; /* Chetwode 100 */
      --md-sys-color-on-primary-container: #384077; /* Chetwode 900 */
      
      --md-sys-color-tertiary: #c46f32; /* Porsche 600 */
      --md-sys-color-on-tertiary: #ffffff;
      --md-sys-color-tertiary-container: #f8eedc; /* Porsche 100 */
      --md-sys-color-on-tertiary-container: #6a3b24; /* Porsche 900 */
      
      --md-sys-color-outline: #74777f;
      --md-sys-color-outline-variant: #c4c7c5;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        /* Dark Theme (Chetwode and Porsche) */
        --md-sys-color-surface: #1a1c1e;
        --md-sys-color-on-surface: #e2e2e6;
        --md-sys-color-surface-variant: #44474e;
        --md-sys-color-on-surface-variant: #c4c6d0;
        --md-sys-color-surface-container: #212545; /* Chetwode 950 */
        
        --md-sys-color-primary: #b0c6f1; /* Chetwode 300 */
        --md-sys-color-on-primary: #3e4795; /* Chetwode 800 */
        --md-sys-color-primary-container: #4a54b8; /* Chetwode 700 */
        --md-sys-color-on-primary-container: #e4edfb; /* Chetwode 100 */
        
        --md-sys-color-tertiary: #e5bf8c; /* Porsche 300 */
        --md-sys-color-on-tertiary: #82462a; /* Porsche 800 */
        --md-sys-color-tertiary-container: #a2572c; /* Porsche 700 */
        --md-sys-color-on-tertiary-container: #f8eedc; /* Porsche 100 */
        
        --md-sys-color-outline: #8e9099;
        --md-sys-color-outline-variant: #444746;
      }
    }
    

    .m3-headline-small {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 32px;
      fill: var(--md-sys-color-on-surface);
    }
    .m3-title-medium {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      letter-spacing: 0.15px;
      fill: var(--md-sys-color-on-surface);
    }
    .m3-title-small {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      letter-spacing: 0.1px;
      fill: var(--md-sys-color-on-surface);
    }
    .m3-body-large {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      letter-spacing: 0.5px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    .m3-body-medium {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: 0.25px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    .m3-body-small {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      letter-spacing: 0.4px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    .m3-label-large {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      letter-spacing: 0.1px;
      fill: var(--md-sys-color-primary);
    }
    .m3-label-medium {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      letter-spacing: 0.5px;
      fill: var(--md-sys-color-on-surface-variant);
    }
    .m3-display-small {
      font-family: 'Roboto', 'Google Sans', system-ui, sans-serif;
      font-size: 36px;
      font-weight: 400;
      line-height: 44px;
      fill: var(--md-sys-color-on-surface);
    }
    

    .m3-container-large {
      rx: 24px;
      fill: var(--md-sys-color-surface);
      stroke: var(--md-sys-color-outline-variant);
      stroke-width: 1px;
    }
    .m3-card-medium {
      rx: 16px;
      fill: var(--md-sys-color-surface-container);
      stroke: var(--md-sys-color-outline-variant);
      stroke-width: 0.5px;
    }
    .m3-bar-chart {
      rx: 4px;
    }
    .m3-divider {
      stroke: var(--md-sys-color-outline-variant);
      stroke-width: 1px;
      opacity: 0.5;
    }
    
</style>
<rect class="m3-container-large" x="0.5" y="0.5" width="599" height="219" />
  <text x="24" y="36" class="m3-headline-small">Top Languages</text>
  <text x="24" y="56" class="m3-body-small">Based on repository size • Updated weekly</text>
  <clipPath id="lang-bar-clip">
    <rect width="552.0" height="12" rx="6" />
  </clipPath>
  <g transform="translate(24, 84)" clip-path="url(#lang-bar-clip)">
    <rect width="552.0" height="12" fill="var(--md-sys-color-surface-variant)" />
    <rect x="0.00" y="0" width="386.40" height="12" fill="#3572A5" />
      <rect x="386.40" y="0" width="165.60" height="12" fill="#dea584" />
  </g>
  <g transform="translate(24, 120)">
    <circle cx="6" cy="6" r="6" fill="#3572A5" />
    <text x="24" y="11" class="m3-body-large">Python</text>
    <text x="200" y="11" class="m3-label-large">70.0%</text>
  </g>

  <g transform="translate(300, 120)">
    <circle cx="6" cy="6" r="6" fill="#dea584" />
    <text x="24" y="11" class="m3-body-large">Rust</text>
    <text x="200" y="11" class="m3-label-large">30.0%</text>
  </g>

</svg>
